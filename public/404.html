<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Adeeran Care Connect</title>
    <script>
      // GitHub Pages SPA redirect trick:
      // Store the path in sessionStorage and redirect to the root.
      var l = window.location;
      sessionStorage.setItem(
        "redirect",
        l.pathname.slice(1) + (l.search ? l.search : "") + l.hash
      );
      l.replace(l.protocol + "//" + l.hostname + (l.port ? ":" + l.port : "") + "/adeeran-care-connect/");
    </script>
  </head>
  <body></body>
</html>
